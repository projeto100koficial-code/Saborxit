plugins {
    id 'com.android.application' version '8.1.1'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

android {
    namespace 'com.exemplo.fftool'
    compileSdk 34

    defaultConfig {
        applicationId "com.exemplo.fftool"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // ESTE É O BLOCO QUE CORRIGE O ERRO DO MANIFESTO
    sourceSets {
        main {
            // Diz ao Gradle que o Manifesto está dentro de app/src/main/
            manifest.srcFile 'app/src/main/AndroidManifest.xml'
            
            // Define onde estão as pastas de código e recursos
            java.srcDirs = ['app/src/main/java', 'app/src/main/kotlin']
            res.srcDirs = ['app/src/main/res']
            assets.srcDirs = ['app/src/main/assets']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // Shizuku API
    implementation "dev.rikka.shizuku:api:13.1.0"
    implementation "dev.rikka.shizuku:provider:13.1.0"
    
    // Dependências essenciais
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
